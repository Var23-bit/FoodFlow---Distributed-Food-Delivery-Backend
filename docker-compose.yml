version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: foodflow-postgres
    environment:
      POSTGRES_USER: foodflow
      POSTGRES_PASSWORD: foodflow_secret
      POSTGRES_DB: foodflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: foodflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: foodflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: foodflow-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 10s
      timeout: 20s
      retries: 12
      start_period: 60s

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: foodflow-auth
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: foodflow
      POSTGRES_PASSWORD: foodflow_secret
      POSTGRES_DB: foodflow
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: foodflow-jwt-secret-key-2024
      JWT_REFRESH_SECRET: foodflow-refresh-secret-key-2024
      AUTH_SERVICE_PORT: 3001
    ports:
      - "3001:3001"

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: foodflow-user
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      KAFKA_BROKERS: kafka:9092
      POSTGRES_USER: foodflow
      POSTGRES_PASSWORD: foodflow_secret
      POSTGRES_DB: foodflow
      USER_SERVICE_PORT: 3002
    ports:
      - "3002:3002"

  restaurant-service:
    build:
      context: .
      dockerfile: services/restaurant-service/Dockerfile
    container_name: foodflow-restaurant
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      KAFKA_BROKERS: kafka:9092
      POSTGRES_USER: foodflow
      POSTGRES_PASSWORD: foodflow_secret
      POSTGRES_DB: foodflow
      RESTAURANT_SERVICE_PORT: 3003
    ports:
      - "3003:3003"

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: foodflow-order
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      KAFKA_BROKERS: kafka:9092
      POSTGRES_USER: foodflow
      POSTGRES_PASSWORD: foodflow_secret
      POSTGRES_DB: foodflow
      ORDER_SERVICE_PORT: 3004
    ports:
      - "3004:3004"

  delivery-service:
    build:
      context: .
      dockerfile: services/delivery-service/Dockerfile
    container_name: foodflow-delivery
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      KAFKA_BROKERS: kafka:9092
      POSTGRES_USER: foodflow
      POSTGRES_PASSWORD: foodflow_secret
      POSTGRES_DB: foodflow
      DELIVERY_SERVICE_PORT: 3005
    ports:
      - "3005:3005"

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: foodflow-notification
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      KAFKA_BROKERS: kafka:9092
      POSTGRES_USER: foodflow
      POSTGRES_PASSWORD: foodflow_secret
      POSTGRES_DB: foodflow
      NOTIFICATION_SERVICE_PORT: 3006
    ports:
      - "3006:3006"

  cart-service:
    build:
      context: .
      dockerfile: services/cart-service/Dockerfile
    container_name: foodflow-cart
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: foodflow-jwt-secret-key-2024
      CART_SERVICE_PORT: 3007
    ports:
      - "3007:3007"

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: foodflow-payment
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: foodflow
      POSTGRES_PASSWORD: foodflow_secret
      POSTGRES_DB: foodflow
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: foodflow-jwt-secret-key-2024
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      PAYMENT_SERVICE_PORT: 3008
    ports:
      - "3008:3008"

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: foodflow-gateway
    depends_on:
      - auth-service
      - user-service
      - restaurant-service
      - order-service
      - delivery-service
      - notification-service
      - cart-service
      - payment-service
      - redis
      - kafka
    environment:
      NODE_ENV: production
      API_GATEWAY_PORT: 3000
      REDIS_HOST: redis
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: foodflow-jwt-secret-key-2024
      CART_SERVICE_PORT: 3007
      PAYMENT_SERVICE_PORT: 3008
      POSTGRES_HOST: postgres
      POSTGRES_USER: foodflow
      POSTGRES_PASSWORD: foodflow_secret
      POSTGRES_DB: foodflow
    ports:
      - "3000:3000"

volumes:
  postgres_data:
